description:
  en: >
    Send a PeSIT F.MESSAGE to a remote partner. Used for application-level
    acknowledgments (ACK). Partner and account can be omitted if the
    sending partner has a "Acquittement (ACK)" address configured (in the
    remote partner's PeSIT settings). In Store-and-Forward mode, enable
    passthrough on relay nodes so that only the final destination sends
    the ACK.
  fr: >
    Envoie un F.MESSAGE PeSIT a un partenaire distant. Utilise pour les
    acquittements applicatifs (ACK). Le partenaire et le compte peuvent
    etre omis si le partenaire d'envoi a une adresse "Acquittement (ACK)"
    configuree (dans les parametres PeSIT du partenaire distant). En mode
    Store-and-Forward, activer passthrough sur les noeuds relais pour
    que seul le destinataire final envoie l'ACK.

passthrough:
  en: Passthrough (S&F relay)
  fr: Passthrough (relais S&F)

passthroughTooltip:
  en: >
    Enable passthrough mode for Store-and-Forward relay nodes. When checked,
    no F.MESSAGE is sent and no ACK tracking entry is created. The ACK from
    the final destination will be automatically relayed upstream.
  fr: >
    Active le mode passthrough pour les noeuds relais Store-and-Forward.
    Si coche, aucun F.MESSAGE n'est envoye et aucune entree de suivi ACK
    n'est creee. L'ACK du destinataire final sera automatiquement relaye
    vers l'amont.

partner:
  en: Partner
  fr: Partenaire

partnerTooltip:
  en: >
    The name of the remote PeSIT partner to send the message to.
    If empty, resolved automatically from the "Acquittement (ACK)" address
    configured on the sending partner.
  fr: >
    Le nom du partenaire PeSIT distant vers lequel envoyer le message.
    Si vide, resolu automatiquement depuis l'adresse "Acquittement (ACK)"
    configuree sur le partenaire d'envoi.

partnerPlaceholder:
  en: Partner name (optional, auto-resolved from Reply To)
  fr: Nom du partenaire (optionnel, auto-resolu depuis Reply To)

account:
  en: Account
  fr: Compte

accountTooltip:
  en: >
    The login of the remote account to use for authentication.
    If empty, resolved from the "Acquittement (ACK)" address or defaults
    to the first account of the partner.
  fr: >
    Le login du compte distant a utiliser pour l'authentification.
    Si vide, resolu depuis l'adresse "Acquittement (ACK)" ou utilise
    par defaut le premier compte du partenaire.

accountPlaceholder:
  en: Account login (optional)
  fr: Login du compte (optionnel)

message:
  en: Message
  fr: Message

messageTooltip:
  en: >
    The content of the F.MESSAGE to send. Supports variable substitution
    (e.g. #TRUEFILENAME#, #TRANSFERID#). Max 4096 characters.
  fr: >
    Le contenu du F.MESSAGE a envoyer. Supporte la substitution de variables
    (ex: #TRUEFILENAME#, #TRANSFERID#). 4096 caracteres max.

messagePlaceholder:
  en: Message content (optional)
  fr: Contenu du message (optionnel)

transferId:
  en: Transfer ID
  fr: ID du transfert

transferIdTooltip:
  en: >
    The PeSIT transfer ID to reference in the F.MESSAGE. If empty,
    uses the current transfer's remote ID. Supports variable substitution.
  fr: >
    L'identifiant de transfert PeSIT a referencer dans le F.MESSAGE.
    Si vide, utilise l'ID distant du transfert en cours. Supporte la
    substitution de variables.

transferIdPlaceholder:
  en: Transfer ID or variable (optional)
  fr: ID transfert ou variable (optionnel)

customerID:
  en: Customer ID
  fr: Customer ID

customerIDTooltip:
  en: >
    Applicative identifier transmitted in the F.MESSAGE. In Store-and-Forward,
    used to propagate the identity of the original sender through the relay
    chain, so that the initial sender knows who actually acknowledged the file.
  fr: >
    Identifiant applicatif transmis dans le F.MESSAGE. En Store-and-Forward,
    utilise pour propager l'identite de l'emetteur original a travers la
    chaine de relais, afin que l'emetteur initial sache qui a reellement
    accuse reception du fichier.

customerIDPlaceholder:
  en: Customer ID (optional)
  fr: Customer ID (optionnel)

bankID:
  en: Bank ID
  fr: Bank ID

bankIDTooltip:
  en: >
    Secondary applicative identifier transmitted in the F.MESSAGE.
    In Store-and-Forward, used as a fallback after Customer ID to
    identify the original sender.
  fr: >
    Identifiant applicatif secondaire transmis dans le F.MESSAGE.
    En Store-and-Forward, utilise comme alternative au Customer ID
    pour identifier l'emetteur original.

bankIDPlaceholder:
  en: Bank ID (optional)
  fr: Bank ID (optionnel)
